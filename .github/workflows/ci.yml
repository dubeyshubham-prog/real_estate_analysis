name: CI

on:
  push:
    branches:
      - main
      - production-refactor
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Compile source
        run: python -m compileall -q app config scripts src tests

      - name: Check Hugging Face deployment files
        run: python -m scripts.check_hf_deployment

      - name: Run tests
        env:
          LOKY_MAX_CPU_COUNT: "2"
        run: python -m pytest -q -p no:cacheprovider
