services:
  proplens:
    build: .
    ports:
      - "8000:7860"
    environment:
      HOST: 0.0.0.0
      PORT: 7860
      RUNTIME_DIR: /tmp/proplens
      ENABLE_VISION: "false"
      USE_OLLAMA_ROUTER: "false"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:7860/health/ready')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
